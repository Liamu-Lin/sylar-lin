logs:
    - name: root
      level: info
      appenders:
          - type: FileLogAppender
            file: /apps/logs/sylar/root.txt
          - type: StdoutLogAppender
    - name: system
      level: info
      appenders:
          - type: FileLogAppender
            formatter: "%d%T%p%T%m%n"
            file: /apps/logs/sylar/system.txt
          - type: StdoutLogAppender
            formatter: "%d%T%p%T%m%n"

system:
    port: 9999
    value: 12345